<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الأنشطة الإنجليزية | Grade 2 & 6</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6C63FF; --primary-dark: #5A52D5;
            --secondary: #FF6584; --accent: #00C9A7;
            --bg: #F0F2FF; --card: #FFF; --text: #2D3436; --light: #636E72;
            --shadow: 0 10px 40px rgba(108,99,255,.15); --radius: 20px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Tajawal',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
        .bg-decoration { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0; overflow:hidden; }
        .bg-circle { position:absolute; border-radius:50%; opacity:.08; animation:float 20s ease-in-out infinite; }
        .bg-circle:nth-child(1) { width:400px; height:400px; background:var(--primary); top:-100px; right:-100px; animation-delay:0s; }
        .bg-circle:nth-child(2) { width:300px; height:300px; background:var(--secondary); bottom:-80px; left:-80px; animation-delay:-7s; }
        .bg-circle:nth-child(3) { width:200px; height:200px; background:var(--accent); top:50%; left:50%; animation-delay:-14s; }
        @keyframes float { 0%,100%{transform:translate(0,0) scale(1);} 33%{transform:translate(30px,-30px) scale(1.05);} 66%{transform:translate(-20px,20px) scale(.95);} }
        .header { position:relative; z-index:10; text-align:center; padding:60px 20px 30px; }
        .header h1 { font-size:2.8em; font-weight:900; background:linear-gradient(135deg,var(--primary),var(--secondary)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; margin-bottom:10px; }
        .header p { font-size:1.2em; color:var(--light); font-weight:500; }
        .container { position:relative; z-index:10; max-width:900px; margin:0 auto; padding:0 20px 60px; }
        .name-section { background:var(--card); border-radius:var(--radius); padding:35px; box-shadow:var(--shadow); margin-bottom:40px; text-align:center; }
        .name-section h2 { font-size:1.4em; margin-bottom:20px; color:var(--primary); }
        .btn { padding:14px 32px; border:none; border-radius:14px; font-family:'Tajawal',sans-serif; font-size:1.1em; font-weight:700; cursor:pointer; transition:all .3s; }
        .btn-primary { background:linear-gradient(135deg,var(--primary),var(--primary-dark)); color:#fff; box-shadow:0 4px 15px rgba(108,99,255,.4); }
        .btn-primary:hover { transform:translateY(-2px); }
        .admin-link { text-align:center; margin-top:40px; }
        .admin-link a { display:inline-flex; align-items:center; gap:8px; color:var(--light); text-decoration:none; font-weight:600; padding:12px 24px; border:2px solid #E8E8FF; border-radius:14px; transition:all .3s; }
        .admin-link a:hover { border-color:var(--primary); color:var(--primary); }
        @keyframes fadeInUp { from{opacity:0;transform:translateY(30px);} to{opacity:1;transform:translateY(0);} }
        .animate-in { animation:fadeInUp .6s ease forwards; }
        .delay-1 { animation-delay:.1s; opacity:0; }
        .delay-2 { animation-delay:.2s; opacity:0; }
        @media(max-width:600px) { .header h1{font-size:2em;} .header{padding:40px 15px 25px;} }
    </style>
</head>
<body>
    <div class="bg-decoration">
        <div class="bg-circle"></div>
        <div class="bg-circle"></div>
        <div class="bg-circle"></div>
    </div>

    <div class="header">
        <h1>📚 بوابة الأنشطة الإنجليزية</h1>
        <p>تعلّم وتدرّب على اللغة الإنجليزية بمتعة</p>
    </div>

    <div class="container">
        <div class="name-section animate-in">
            <h2>👋 مرحباً بك!</h2>
            <p style="color:var(--light);margin-bottom:25px;">سجّل دخولك للوصول لأنشطتك</p>
            <button class="btn btn-primary" onclick="window.location.href='student-portal.html'" style="max-width:300px;margin:0 auto;display:block;">🔑 تسجيل دخول الطالب</button>
        </div>

        <div class="admin-link animate-in delay-1">
            <a href="admin.html">🔧 لوحة تحكم المشرف</a>
        </div>
    </div>
</body>
</html>
