<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الصف الثاني - القواعد</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--primary:#6C63FF;--accent:#00C9A7;--wrong:#FF6584;--bg:#F0F2FF;--card:#FFF;--text:#2D3436;--light:#636E72;--radius:20px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.header{background:linear-gradient(135deg,var(--primary),#5A52D5);color:#fff;text-align:center;padding:25px 20px;}
.back{display:inline-flex;align-items:center;gap:6px;color:#fff;text-decoration:none;background:rgba(255,255,255,.2);padding:8px 16px;border-radius:12px;margin-bottom:10px;font-weight:600;}
.container{max-width:700px;margin:0 auto;padding:25px 20px;}
.question-block{background:var(--card);border-radius:var(--radius);padding:22px;margin-bottom:18px;box-shadow:0 4px 20px rgba(108,99,255,.08);}
.question-block h4{margin-bottom:14px;font-size:1.1em;}
.question-block .sentence{direction:ltr;text-align:left;font-size:1.2em;font-weight:600;margin-bottom:12px;padding:10px 15px;background:#F8F7FF;border-radius:10px;}
.options{display:flex;flex-wrap:wrap;gap:10px;}
.option{padding:12px 20px;border:2px solid #E8E8FF;border-radius:14px;cursor:pointer;transition:all .2s;font-size:1em;min-width:100px;text-align:center;}
.option:hover{border-color:var(--primary);background:#F8F7FF;}
.option.selected{border-color:var(--primary);background:#EDE9FF;}
.option.correct{border-color:var(--accent)!important;background:#E0FFF8!important;color:#00875A;}
.option.wrong{border-color:var(--wrong)!important;background:#FFF0F3!important;color:#C0392B;}
.controls{display:flex;gap:12px;justify-content:center;margin-top:30px;flex-wrap:wrap;}
.btn{padding:14px 36px;border:none;border-radius:14px;font-family:'Tajawal',sans-serif;font-size:1.1em;font-weight:700;cursor:pointer;transition:all .3s;}
.btn-primary{background:linear-gradient(135deg,var(--primary),#5A52D5);color:#fff;box-shadow:0 4px 15px rgba(108,99,255,.4);}
.btn-secondary{background:#EDE9FF;color:var(--primary);}
.result-box{background:var(--card);border-radius:var(--radius);padding:30px;text-align:center;box-shadow:0 8px 30px rgba(108,99,255,.15);display:none;margin-top:20px;}
.result-box .score{font-size:3em;font-weight:900;color:var(--primary);margin:15px 0;}
.timer{background:rgba(255,255,255,.15);padding:8px 16px;border-radius:10px;display:inline-block;font-weight:700;margin-bottom:15px;}
</style>
</head>
<body>
<div class="header">
<a href="../grade2.html" class="back">→ رجوع</a>
<h1>✏️ القواعد - الصف الثاني</h1>
<div class="timer" id="timer">⏱ 00:00</div>
</div>
<div class="container">
<div id="quiz"></div>
<div class="controls" id="controls"><button class="btn btn-primary" onclick="submitAnswers()">تسليم ✓</button></div>
<div class="result-box" id="result">
<h2 id="resultTitle"></h2><div class="score" id="scoreDisplay"></div><div id="resultDetails"></div>
<div class="controls"><button class="btn btn-secondary" onclick="location.reload()">إعادة ↻</button><a href="../grade2.html" class="btn btn-primary">العودة</a></div>
</div>
</div>
<script>
const quiz={questions:[
{sentence:'She ___ a student.',options:['am','is','are','be'],correct:1},
{sentence:'They ___ playing in the park.',options:['is','am','are','was'],correct:2},
{sentence:'I ___ a cat.',options:['is','am','are','has'],correct:1},
{sentence:'He ___ to school every day.',options:['go','goes','going','gone'],correct:1},
{sentence:'We ___ happy today.',options:['is','am','are','was'],correct:2},
{sentence:'The birds ___ in the sky.',options:['fly','flies','flying','flies'],correct:0}
],};
let answers={};let startTime=Date.now();
setInterval(()=>{const s=Math.floor((Date.now()-startTime)/1000);document.getElementById('timer').textContent=`⏱ ${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;},1000);
const qd=document.getElementById('quiz');
quiz.questions.forEach((q,i)=>{const d=document.createElement('div');d.className='question-block';d.innerHTML=`<h4>${i+1}. أكمل الجملة:</h4><div class="sentence">${q.sentence}</div><div class="options">${q.options.map((o,j)=>`<div class="option" data-q="${i}" data-a="${j}" onclick="sel(this,${i},${j})">${o}</div>`).join('')}</div>`;qd.appendChild(d);});
function sel(el,q,a){document.querySelectorAll(`.option[data-q="${q}"]`).forEach(o=>o.classList.remove('selected'));el.classList.add('selected');answers[q]=a;}
function submitAnswers(){let c=0;quiz.questions.forEach((q,i)=>{if(answers[i]===q.correct)c++;document.querySelectorAll(`.option[data-q="${i}"]`).forEach(o=>{if(parseInt(o.dataset.a)===q.correct)o.classList.add('correct');if(answers[i]===parseInt(o.dataset.a)&&answers[i]!==q.correct)o.classList.add('wrong');o.style.pointerEvents='none';});});
const time=Math.floor((Date.now()-startTime)/1000);const t=quiz.questions.length,pct=Math.round((c/t)*100);
document.getElementById('controls').style.display='none';document.getElementById('result').style.display='block';
document.getElementById('resultTitle').textContent=c===t?'🎉 ممتاز!':'👍 أحسنت!';
document.getElementById('scoreDisplay').textContent=`${c} / ${t}`;
document.getElementById('resultDetails').textContent=`النتيجة: ${pct}% | الوقت: ${Math.floor(time/60)} دقيقة و ${time%60} ثانية`;
save(c,t,pct,time);
}
function save(s,t,p,tm){const r={studentName:localStorage.getItem('studentName')||'طالب',grade:2,gradeName:'الصف الثاني',activityName:'القواعد',score:s,total_questions:t,percentage:p,time_taken_seconds:tm,date:new Date().toISOString().split('T')[0],submittedAt:new Date().toISOString()};fetch('/api/save-result',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(r)}).catch(()=>{let a=JSON.parse(localStorage.getItem('studentResults')||'[]');a.push(r);localStorage.setItem('studentResults',JSON.stringify(a));});}
</script>
</body>
</html>
